<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AE Particulate Sensor | Real-time Dashboard</title>
    <meta name="description" content="Real-time air quality monitoring for AE Particulate Sensor. Monitor AQI, PM2.5, PM10, Temperature, and Humidity." />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" crossorigin src="/assets/index-Csc0t5tx.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CRK3cr7F.css">
  </head>
  <body>
    <div id="app">
      <header class="glass">
        <div class="header-content container">
          <div class="logo-area">
            <img src="/logo.png" alt="AE Logo" class="brand-logo" />
            <div class="brand-text">
              <span class="brand-name">AE SENSOR</span>
              <span class="brand-tagline">Air Quality Monitor</span>
            </div>
          </div>
          <div class="status-area">
            <div id="status-indicator" class="indicator disconnected"></div>
            <span id="status-text">Connecting...</span>
            <button id="settings-btn" class="icon-btn"><i data-lucide="settings"></i></button>
          </div>
        </div>
      </header>

      <!-- Settings Modal -->
      <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content glass">
          <h2>Connection Settings</h2>
          <p>Enter the IP address of your backend server:</p>
          <div class="input-group">
            <input type="text" id="backend-ip" placeholder="e.g., 192.168.4.2" value="localhost" />
            <span>:3000</span>
          </div>
          <button id="save-settings" class="btn-cyan">Save & Reconnect</button>
          <button id="close-settings" class="btn-text">Close</button>
        </div>
      </div>

      <main class="container">
        <!-- Hero Section: AQI -->
        <section class="hero-section">
          <div class="aqi-card glass glow-cyan">
            <div class="card-header">
              <i data-lucide="wind" class="icon-cyan"></i>
              <h3>Overall AQI</h3>
            </div>
            <div class="aqi-value-container">
              <h1 id="aqi-value">--</h1>
              <div class="aqi-label" id="aqi-quality">Initializing...</div>
            </div>
            <div class="aqi-progress-bar">
              <div id="aqi-progress" class="progress-fill" style="width: 0%"></div>
            </div>
          </div>
        </section>

        <!-- Metrics Grid -->
        <section class="metrics-grid">
          <div class="metric-card glass" data-metric="pm2_5">
            <div class="metric-icon">
              <i data-lucide="layers"></i>
            </div>
            <div class="metric-info">
              <span class="label">PM 2.5</span>
              <div class="value-row">
                <span id="pm2_5-value" class="value">--</span>
                <span class="unit">µg/m³</span>
              </div>
            </div>
          </div>

          <div class="metric-card glass" data-metric="pm10">
            <div class="metric-icon">
              <i data-lucide="component"></i>
            </div>
            <div class="metric-info">
              <span class="label">PM 10</span>
              <div class="value-row">
                <span id="pm10-value" class="value">--</span>
                <span class="unit">µg/m³</span>
              </div>
            </div>
          </div>

          <div class="metric-card glass" data-metric="pm25">
            <div class="metric-icon">
              <i data-lucide="box"></i>
            </div>
            <div class="metric-info">
              <span class="label">PM 25</span>
              <div class="value-row">
                <span id="pm25-value" class="value">--</span>
                <span class="unit">µg/m³</span>
              </div>
            </div>
          </div>

          <div class="metric-card glass" data-metric="temp">
            <div class="metric-icon">
              <i data-lucide="thermometer"></i>
            </div>
            <div class="metric-info">
              <span class="label">Temperature</span>
              <div class="value-row">
                <span id="temp-value" class="value">--</span>
                <span class="unit">°C</span>
              </div>
            </div>
          </div>

          <div class="metric-card glass" data-metric="humidity">
            <div class="metric-icon">
              <i data-lucide="droplets"></i>
            </div>
            <div class="metric-info">
              <span class="label">Humidity</span>
              <div class="value-row">
                <span id="humidity-value" class="value">--</span>
                <span class="unit">%</span>
              </div>
            </div>
          </div>
        </section>

        <section class="footer-info">
          <p>Last updated: <span id="last-updated">Never</span></p>
        </section>
      </main>

      <div class="bg-blur">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
      </div>
    </div>
    <script>
      // Initialize Lucide icons
      window.addEventListener('load', () => {
        lucide.createIcons();
      });
    </script>
  </body>
</html>
